name: Release CLI

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version-file: 'cli/go.mod'
          cache-dependency-path: 'cli/go.sum'

      # F-06: GoReleaser action pinned to a full commit SHA (not a floating @v6 tag).
      # A floating tag can be silently updated by an attacker who compromises the
      # goreleaser GitHub account, injecting malicious code into every bloc release.
      # SHA corresponds to goreleaser/goreleaser-action v6.3.0 (2025-05-12).
      # To update: find the new commit SHA at https://github.com/goreleaser/goreleaser-action/tags
      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@9c156ee8a17a598857849441385a2041ef570552 # v6.3.0
        with:
          # F-06: Pin to a specific GoReleaser version — not "latest".
          # "latest" produces non-deterministic, non-reproducible builds.
          version: v2.9.0
          args: release --clean
          workdir: cli/
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
          # F-06: GPG signing — enable once bloc-org/homebrew-bloc repo is created
          # and GPG_FINGERPRINT secret is added to the repository settings.
          # Signed releases let users verify binary authenticity via checksums.txt.sig.
          # GPG_FINGERPRINT: ${{ secrets.GPG_FINGERPRINT }}

  release-windows-msi:
    runs-on: windows-latest
    needs: goreleaser
    steps:
      - name: Checkout Code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Download Windows ZIP from release
        shell: bash
        run: |
          # Wait 10 seconds to make sure Github API registers the release assets
          sleep 10
          gh release download ${{ github.ref_name }} --pattern "bloc_windows_amd64.zip" --dir dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract executable
        shell: pwsh
        run: |
          Expand-Archive -Path dist/bloc_windows_amd64.zip -DestinationPath dist/extracted -Force
          Copy-Item -Path dist/extracted/bloc.exe -Destination ./bloc.exe

      - name: Build MSI using WiX Toolset
        shell: pwsh
        run: |
          # Compile the WiX source (-arch x64 sets Template Summary Property to x64, required by ICE80)
          & "candle.exe" cli/installer/bloc.wxs -arch x64 -out dist/bloc.wixobj
          # Link into the MSI installer
          & "light.exe" dist/bloc.wixobj -out dist/bloc_windows_amd64.msi

      - name: Upload MSI to Release
        shell: bash
        run: |
          gh release upload ${{ github.ref_name }} dist/bloc_windows_amd64.msi --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

